name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install extension dependencies
        working-directory: src/AutoContext.VsCode
        run: npm ci

      - name: Install web MCP server dependencies
        working-directory: src/AutoContext.Mcp.Web
        run: npm ci

      - name: Build and test
        run: pwsh ./build.ps1
